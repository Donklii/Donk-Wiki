name: Fetch Steam Data

on:
  schedule:
    - cron: '0 6 * * *'   # Roda todo dia às 06:00 UTC
  workflow_dispatch:        # Permite disparar manualmente pela aba Actions

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Steam data
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ secrets.STEAM_ID }}
        run: |
          curl -sf "https://api.steampowered.com/ISteamUser/GetPlayerSummaries/v2/?key=${STEAM_API_KEY}&steamids=${STEAM_ID}" \
            -o /tmp/summary.json

          curl -sf "https://api.steampowered.com/IPlayerService/GetRecentlyPlayedGames/v1/?key=${STEAM_API_KEY}&steamid=${STEAM_ID}&count=6" \
            -o /tmp/recent.json

          curl -sf "https://api.steampowered.com/IPlayerService/GetOwnedGames/v1/?key=${STEAM_API_KEY}&steamid=${STEAM_ID}&include_appinfo=true&include_played_free_games=false" \
            -o /tmp/owned.json

          jq -s --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '{
            summary:  .[0].response.players[0],
            recent:   .[1].response,
            owned: {
              game_count: .[2].response.game_count,
              total_playtime_minutes: ([.[2].response.games[].playtime_forever] | add // 0),
              top_played: (.[2].response.games | sort_by(-.playtime_forever) | .[0:10])
            },
            updated_at: $ts
          }' /tmp/summary.json /tmp/recent.json /tmp/owned.json > data/steam.json

      - name: Fetch Steam reviews for top 5 games
        run: |
          python3 << 'EOF'
          import json, urllib.request

          with open('/tmp/owned.json') as f:
              owned = json.load(f)

          games = owned.get('response', {}).get('games') or []
          top5 = sorted(games, key=lambda g: -g.get('playtime_forever', 0))[:5]

          result = []
          for g in top5:
              appid = g['appid']
              url = (
                  f"https://store.steampowered.com/appreviews/{appid}"
                  f"?json=1&filter=recent&language=portuguese,english"
                  f"&num_per_page=10&purchase_type=steam"
              )
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      data = json.load(r)
              except Exception:
                  data = {'reviews': [], 'query_summary': {}}

              result.append({
                  'appid': appid,
                  'name': g.get('name', ''),
                  'playtime_forever': g.get('playtime_forever', 0),
                  'review_score_desc': data.get('query_summary', {}).get('review_score_desc', ''),
                  'reviews': data.get('reviews', [])
              })

          with open('data/reviews.json', 'w') as f:
              json.dump(result, f)
          EOF

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/steam.json data/reviews.json
          git diff --staged --quiet || git commit -m "chore: update Steam data [skip ci]"
          git push
