<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk:Donklii — Donk Wiki</title>
    <link rel="icon" href="Imagens/Donklii.jpg" type="image/jpeg">
    <link rel="stylesheet" href="Css/styles.css">
    <link rel="stylesheet" href="Css/components.css">
    <script src="JavaScripts/i18n.js"></script>
    <style>
        /* =====================
           Talk page styles
           ===================== */
        .talk-section {
            margin-bottom: 2.5rem;
        }
        .talk-section h2 {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .review-score-badge {
            font-family: var(--font-body);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            padding: 2px 8px;
            border-radius: 3px;
            border: 1px solid;
        }
        .score-positive  { border-color: #3a6e3a; color: #7dce7d; background: #1a2e1a; }
        .score-mixed     { border-color: #6e6e1e; color: #cece60; background: #2a2a0e; }
        .score-negative  { border-color: #6e1e1e; color: #ce6060; background: #2a0e0e; }
        .score-none      { border-color: var(--color-border); color: var(--color-muted); }

        /* Individual review entry */
        .review-entry {
            border-left: 2px solid var(--color-border);
            padding: 0.6rem 0 0.6rem 1rem;
            margin-bottom: 1rem;
            position: relative;
        }
        .review-entry:last-child { margin-bottom: 0; }
        .review-verdict {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 0.35rem;
        }
        .verdict-up   { color: #7dce7d; }
        .verdict-down { color: #ce6060; }
        .review-body {
            font-size: 0.85rem;
            color: var(--color-text);
            line-height: 1.65;
            margin-bottom: 0.5rem;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 10rem;
            overflow: hidden;
            position: relative;
        }
        .review-body.expanded { max-height: none; }
        .review-body::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2.5rem;
            background: linear-gradient(transparent, var(--bg-container));
            pointer-events: none;
        }
        .review-body.expanded::after { display: none; }
        .review-expand-btn {
            background: none;
            border: none;
            color: var(--color-muted);
            font-size: 0.75rem;
            cursor: pointer;
            padding: 0;
            margin-bottom: 0.4rem;
            display: block;
        }
        .review-expand-btn:hover { color: var(--color-text); }
        .review-sig {
            font-size: 0.72rem;
            color: #4a6050;
            font-style: italic;
        }
        .review-sig a { color: #5a8070; }
        .review-sig .review-hours {
            color: var(--color-muted);
        }
        .talk-hr {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: 0.75rem 0 1.25rem;
        }
        .talk-no-reviews {
            color: var(--color-muted);
            font-size: 0.85rem;
            font-style: italic;
            padding-left: 1rem;
        }
        /* Loading / error */
        .talk-loading, .talk-error {
            padding: 2rem;
            text-align: center;
            color: var(--color-muted);
            font-size: 0.9rem;
        }
        .talk-error { color: #ff8888; }

        /* TOC */
        .toc-box ol { list-style: decimal; }
    </style>
</head>
<body data-last-edited="5 April 2026">

    <!-- Left sidebar panel -->
    <div id="mw-panel"></div>

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay"></div>

    <!-- Top navigation head -->
    <div id="mw-head"></div>

    <!-- Main content -->
    <div id="content" class="mw-body">
        <div class="container">
            <a id="top"></a>
            <h1 id="firstHeading"><span data-i18n="tab_talk">Talk</span>:Donklii</h1>
            <div id="siteSub" data-i18n="site_sub">From Donk Wiki</div>

            <div id="talk-root">
                <div class="talk-loading">Loading reviews…</div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer" role="contentinfo"></div>

    <script src="JavaScripts/glossario.js"></script>
    <script src="JavaScripts/layout.js"></script>
    <script>
    (function () {
        function fmtDate(ts) {
            if (!ts) return '';
            return new Date(ts * 1000).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function fmtHours(minutes) {
            return Math.round(minutes / 60) + ' h';
        }

        function scoreClass(desc) {
            if (!desc) return 'score-none';
            var d = desc.toLowerCase();
            if (d.includes('overwhelmingly positive') || d.includes('very positive') || d.includes('positive')) return 'score-positive';
            if (d.includes('mixed')) return 'score-mixed';
            if (d.includes('negative')) return 'score-negative';
            return 'score-none';
        }

        function truncated(text) {
            return text.length > 400;
        }

        function render(games) {
            if (!games || !games.length) {
                document.getElementById('talk-root').innerHTML =
                    '<div class="talk-no-reviews">No review data yet — run the GitHub Action to populate.</div>';
                return;
            }

            var tocItems = '';
            var sections = '';

            games.forEach(function (game, gi) {
                var tid = 'game-' + gi;
                tocItems += '<li><a href="#' + tid + '">' + game.name + '</a></li>';

                var badgeClass = scoreClass(game.review_score_desc);
                var badgeText  = game.review_score_desc || '—';

                sections += '<div class="talk-section" id="' + tid + '">';
                sections += '<h2>';
                sections += game.name;
                if (game.playtime_forever) {
                    sections += ' <span style="font-size:0.75rem;color:var(--color-muted);font-family:var(--font-body);font-weight:400;">' + fmtHours(game.playtime_forever) + '</span>';
                }
                sections += ' <span class="review-score-badge ' + badgeClass + '">' + badgeText + '</span>';
                sections += '</h2>';
                sections += '<hr class="talk-hr">';

                var reviews = game.reviews || [];
                if (!reviews.length) {
                    sections += '<p class="talk-no-reviews">No recent reviews.</p>';
                } else {
                    reviews.forEach(function (rv, ri) {
                        var uid   = 'rv-' + gi + '-' + ri;
                        var up    = rv.voted_up;
                        var body  = (rv.review || '').trim();
                        var long  = body.length > 400;
                        var hours = rv.author && rv.author.playtime_at_review
                            ? fmtHours(rv.author.playtime_at_review) : '';
                        var date  = fmtDate(rv.timestamp_created);
                        var steamUrl = rv.recommendationid
                            ? 'https://store.steampowered.com/recommendationdetails/' + rv.recommendationid + '/'
                            : '#';

                        sections += '<div class="review-entry">';
                        sections += '<div class="review-verdict ' + (up ? 'verdict-up' : 'verdict-down') + '">';
                        sections += (up ? '▲ Recommended' : '▼ Not Recommended');
                        sections += '</div>';
                        sections += '<div class="review-body" id="' + uid + '">' + body + '</div>';
                        if (long) {
                            sections += '<button class="review-expand-btn" onclick="expandReview(\'' + uid + '\', this)">Show more ▾</button>';
                        }
                        sections += '<div class="review-sig">';
                        sections += '<a href="' + steamUrl + '" target="_blank">Steam review</a>';
                        if (hours) sections += ' · <span class="review-hours">' + hours + ' on record at review</span>';
                        if (date)  sections += ' · ' + date;
                        sections += '</div>';
                        sections += '</div>';
                    });
                }

                sections += '</div>';
            });

            var toc = '<nav class="toc-box" style="margin-bottom:2rem">'
                + '<div class="toc-header"><span data-i18n="toc_contents">Contents</span></div>'
                + '<ol class="toc-list">' + tocItems + '</ol>'
                + '</nav>';

            document.getElementById('talk-root').innerHTML = toc + sections;

            // Re-apply i18n on newly injected content
            if (typeof applyTranslations === 'function' && typeof currentLang !== 'undefined') {
                applyTranslations(currentLang);
            }
        }

        fetch('data/reviews.json')
            .then(function (res) {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(render)
            .catch(function (err) {
                document.getElementById('talk-root').innerHTML =
                    '<div class="talk-error">Could not load review data.<br><small>' + err.message + '</small></div>';
            });

        window.expandReview = function (uid, btn) {
            var el = document.getElementById(uid);
            el.classList.add('expanded');
            btn.style.display = 'none';
        };
    })();
    </script>
</body>
</html>
